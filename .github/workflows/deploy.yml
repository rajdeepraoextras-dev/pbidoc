name: Deploy to production

on:
  push:
    branches: [main]
  workflow_dispatch:

# Only one production deploy at a time. Rapid successive pushes otherwise
# overlap on the single VM -- a still-running `docker build` holds the box
# while the next run's SSH handshake fails ("unable to authenticate"). Queue
# runs instead of cancelling, so an in-flight build/health-check finishes
# cleanly before the next starts.
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          PBICOMPASS_DB: ${{ secrets.PBICOMPASS_DB }}
          MESHAPI_API_KEY: ${{ secrets.MESHAPI_API_KEY }}
          PBICOMPASS_ADMIN_TOKEN: ${{ secrets.PBICOMPASS_ADMIN_TOKEN }}
          PBICOMPASS_BOOTSTRAP_ADMIN_EMAIL: ${{ secrets.PBICOMPASS_BOOTSTRAP_ADMIN_EMAIL }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          envs: SUPABASE_URL,SUPABASE_ANON_KEY,SUPABASE_SERVICE_ROLE_KEY,PBICOMPASS_DB,MESHAPI_API_KEY,PBICOMPASS_ADMIN_TOKEN,PBICOMPASS_BOOTSTRAP_ADMIN_EMAIL
          script: |
            set -e
            cd ~/pbicompass
            git pull origin main

            # Idempotently upsert secret-managed vars into the persistent,
            # never-committed ~/pbicompass.env (outside the repo dir, read by
            # `docker run --env-file` below). Only touches a key when the
            # matching GitHub secret is actually set, so vars maintained by
            # hand directly on the VM (e.g. ANTHROPIC_API_KEY) are left alone
            # unless/until you also add them as GitHub secrets.
            touch ~/pbicompass.env
            upsert_env() {
              if [ -n "$2" ]; then
                grep -v "^$1=" ~/pbicompass.env > ~/pbicompass.env.tmp || true
                mv ~/pbicompass.env.tmp ~/pbicompass.env
                echo "$1=$2" >> ~/pbicompass.env
              fi
            }
            upsert_env SUPABASE_URL "$SUPABASE_URL"
            upsert_env SUPABASE_ANON_KEY "$SUPABASE_ANON_KEY"
            upsert_env SUPABASE_SERVICE_ROLE_KEY "$SUPABASE_SERVICE_ROLE_KEY"
            upsert_env PBICOMPASS_DB "$PBICOMPASS_DB"
            upsert_env MESHAPI_API_KEY "$MESHAPI_API_KEY"
            upsert_env PBICOMPASS_ADMIN_TOKEN "$PBICOMPASS_ADMIN_TOKEN"
            upsert_env PBICOMPASS_BOOTSTRAP_ADMIN_EMAIL "$PBICOMPASS_BOOTSTRAP_ADMIN_EMAIL"
            # Store JOB METADATA in the same managed Postgres as accounts, so a
            # hosted deploy keeps no sqlite at all (Day 34). Rendered document
            # bytes are never persisted (held in process memory, TTL-swept) --
            # zero-retention. Reuses the PBICOMPASS_DB secret; separate tables.
            upsert_env PBICOMPASS_JOBS_DB "$PBICOMPASS_DB"
            # Gate the hosted app (sign-in required to upload). Not a secret --
            # just a launch flag -- so it's written as a literal "1" rather
            # than sourced from a GitHub secret.
            upsert_env PBICOMPASS_REQUIRE_AUTH "1"

            sudo docker build -t pbicompass .
            # Preserve the previous container's logs before it's destroyed --
            # a wedged/crashed process's last output is the only evidence of
            # WHY once `docker rm` runs (2026-07-13: two production hangs
            # were undiagnosable because each deploy shredded the logs).
            sudo docker logs --tail 500 pbicompass > ~/pbicompass-last-container.log 2>&1 || true
            sudo docker rm -f pbicompass || true
            sudo docker run -d --name pbicompass \
              -p 127.0.0.1:8000:8000 \
              -v pbicompass-data:/data \
              --tmpfs /tmp/pbicompass:rw,size=512m \
              --env-file ~/pbicompass.env \
              --restart unless-stopped \
              --label autoheal=true \
              pbicompass
            # Watchdog: restart any container whose HEALTHCHECK goes
            # unhealthy (the Dockerfile probes /healthz). `docker restart`
            # keeps the container and its logs, so a wedge self-recovers in
            # ~2 minutes AND stays diagnosable afterwards.
            if ! sudo docker ps --format '{{.Names}}' | grep -q '^autoheal$'; then
              sudo docker run -d --name autoheal --restart always \
                -e AUTOHEAL_CONTAINER_LABEL=autoheal \
                -v /var/run/docker.sock:/var/run/docker.sock \
                willfarrell/autoheal || echo "WARNING: autoheal failed to start; continuing without it"
            fi
            for i in $(seq 1 30); do
              if curl -sf http://localhost:8000/healthz; then
                echo "Service is healthy after ${i}s"
                exit 0
              fi
              sleep 1
            done
            echo "Service did not become healthy within 30s" >&2
            exit 1
